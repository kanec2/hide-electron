        (function() {
            // Функция, которая запустится ТОЛЬКО когда jQuery точно будет доступен
            function startApp() {
                console.log('✅ jQuery v' + $.fn.jquery + ' готов к работе');
                // 👇 Ваш код инициализации приложения
                // $(document).ready(() => { ... });
                // initUI();
            }

            // Попытка загрузки через Node.js
            try {
                window.$ = window.jQuery = require('jquery');
                console.log('✅ jQuery загружен через require()');
                startApp();
            } catch (e) {
                console.warn('⚠️ require("jquery") недоступен, пробую локальный файл...');
            
                // Фоллбэк: динамически создаём <script>
                var script = document.createElement('script');
                script.src = './libs/jquery-3.2.1.js'; // 🔸 Путь относительно app.html
                script.onload = function() {
                    // jQuery сам создаёт window.jQuery и window.$, но для надёжности:
                    window.$ = window.jQuery = window.jQuery || window.$;
                    console.log('✅ jQuery загружен из локального файла');
                    startApp();
                };
                script.onerror = function() {
                    console.error('❌ Не удалось загрузить jQuery ни через npm, ни локально!');
                };
                document.head.appendChild(script);
            }
        })();
    </script>

            require = window.nodeRequire;
            module.exports = window.moduleExports;
        }
        // Экспортируем для удобства
        window.electron = typeof require !== 'undefined' ? require('electron') : null;

    <!-- === 3. Инициализация — ПОСЛЕ загрузки app.js === -->
    <script>
        // Ждём, когда Haxe-код инициализируется
        function initApp() {
            if (!window.hide || !window.hide.Ide || !window.hide.Ide.inst) {
                setTimeout(initApp, 100);
                return;
            }
            
            console.log("[app.html] ✅ Haxe IDE ready, initializing UI...");
            initGoldenLayout();
            initSubViewHandler();
        }
        
        // Инициализация GoldenLayout
        function initGoldenLayout() {
            if (typeof GoldenLayout === 'undefined') {
                console.error("[app.html] ❌ GoldenLayout not loaded");
                return;
            }
            
            // Убеждаемся, что контейнер есть
            var $container = $('#main-container');
            if ($container.length === 0) {
                $('body').append('<div id="main-container" style="position:absolute;top:0;left:0;right:0;bottom:0;"></div>');
                $container = $('#main-container');
            }
            
            var config = {
                settings: {
                    hasHeaders: true,
                    constrainDragToContainer: false,
                    reorderEnabled: true,
                    selectionEnabled: false,
                    popoutWholeStack: false,
                    blockedPopoutsThrowError: true,
                    closePopoutsOnUnload: true,
                    showPopoutIcon: false,
                    showMaximiseIcon: true,
                    showCloseIcon: true
                },
                content: [{
                    type: 'row',
                    content: [{
                        type: 'component',
                        componentName: 'welcome',
                        title: 'Welcome',
                        width: 100
                    }]
                }]
            };
            
            console.log("[app.html] 🪟 Creating GoldenLayout...");
            var myLayout = new GoldenLayout(config, $container);
            
            // Заглушка для welcome
            myLayout.registerComponent('welcome', function(container, state) {
                container.getElement().html('<h2>Welcome to Hide IDE</h2><p>Select a project to begin</p>');
            });
            
            // Универсальный обработчик для компонентов из Haxe
            myLayout.registerComponent('*', function(container, state) {
                console.log("[GL] Creating: " + state.componentName);
                container.getElement().html('<div>[' + state.componentName + ']</div>');
            });
            
            myLayout.init();
            console.log("[app.html] ✅ GoldenLayout initialized");
            
            // Передаём ссылку в Haxe
            if (window.hide.Ide.inst.windowManager) {
                window.hide.Ide.inst.windowManager.setGoldenLayout(myLayout);
            }
        }
        
        // Обработчик суб-вью из параметров URL
        function initSubViewHandler() {
            function getQueryVariable(variable) {
                var query = window.location.search.substring(1);
                var vars = query.split("&");
                for (var i = 0; i < vars.length; i++) {
                    var pair = vars[i].split("=");
                    if (pair[0] == variable) { 
                        try { return decodeURIComponent(pair[1]); } 
                        catch(e) { return pair[1]; }
                    }
                }
                return null;
            }

            var subView = getQueryVariable("subView");
            if (subView != null) {
                console.log("[app.html] 🪟 Sub-view requested: " + subView);
                
                var state = null;
                var stateJson = getQueryVariable("state");
                if (stateJson != null) {
                    try { state = JSON.parse(decodeURIComponent(stateJson)); } 
                    catch(e) { console.warn("State parse error:", e); }
                }
                
                var position = getQueryVariable("pos");
                
                if (window.hide.Ide.inst.isInitialized) {
                    window.hide.Ide.inst.open(subView, state, position);
                } else {
                    // Ждём инициализации
                    var checkInit = setInterval(function() {
                        if (window.hide.Ide.inst.isInitialized) {
                            clearInterval(checkInit);
                            window.hide.Ide.inst.open(subView, state, position);
                        }
                    }, 50);
                }
            }
        }
        
        // Запускаем после DOM ready
        $(document).ready(function() {
            console.log("[app.html] 🔄 DOM ready, waiting for Haxe...");
            initApp();
        });
    </script>
